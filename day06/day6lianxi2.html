<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合案例2</title>
    <style>
        .tp h2{
            background-color: #f3f3f4;
            width: 1700px;
            height: 1500px;
            background-image: url(damingshan.jpg);
            background-repeat: no-repeat;
            background-position: left bottom;
            text-align: right;
            line-height: 500px;
        }
        .tp p{
            font-size: 50px;
        }
        .tp a{
            display: block;
            width: 500px;
            height: 200px;
            background-color: red;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div class="tp">
        <h2>这里是大明山景区</h2>
        <p>祝你们在这里玩的开心</p>
        <a href="#">我要参观</a>
    </div>
</body>
</html>
