<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合练习</title>
    <style>
        .d{
            background-image: url(./riluo.jpg);
            width: 1200px;
            height: 500px;
            background-position: center;
            background-size: cover;
            text-align: center;
        }
        .d h1{
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-align: center;
        }
        .d h2{
            color: blue;
            text-align: center;
        }
        .btn:hover{
            background-color: aqua;
        }
        .btn{
           padding:10px 20px;
        }
    </style>
</head>
<body>
    <div class="d">
        <h1>
            探索世界每一个角落
        </h1>
        <h2>
            Travel Around World
        </h2>
        <button class="btn">
            立即出发
        </button>
    </div>
</body>
</html>
