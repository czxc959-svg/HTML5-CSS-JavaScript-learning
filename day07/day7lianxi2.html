<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合案例</title>
    <style>
        .div{
            background-image: url(youxi.jpg);
            background-size: cover;
            width: 1200px;
            height: 600px;
            text-align: center;
        }
        .b1{
            background-color: orange;
            padding: 10px 20px;
            text-align: center;
        }
        .b1:hover{
            background-color: darkblue;
        }
        .b2{
            background-color: white;
            text-align: center;
            padding: 10px 20px;
        }
        .b2:hover{
            background-color: darkcyan;
            color: black;
        }
    </style>
</head>
<body>
    <div class="div">
        <h1>
            幻想大陆
        </h1>
        <h2>
            新版本正式上线
        </h2>
        <button class="b1">
            立即下载
        </button>
        <button class="b2">
            查看详情
        </button>
    </div>
</body>
</html>
