<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合作业</title>
</head>
<body>
    <!-- 要求一 -->
     <h1>学生信息登记系统</h1>
    <!-- 要求二 -->
     <h2>兴趣爱好</h2>
     <ul>
        <li>打篮球</li>
        <li>听音乐</li>
        <li>编程</li>
        <li>看电影</li>
     </ul>
    <!-- 要求三 -->
     <h2>学习计划</h2>
     <ol>
        <li>学习HTML</li>
        <li>学习CSS</li>
        <li>学习JavaScript</li>
        <li>学习vue</li>
     </ol>
    <!-- 要求四 -->
      <h2>前端三件套</h2>
      <dl>
        <dt>HTML</dt>
        <dd>超文本标记语言</dd>
        <dt>CSS</dt>
        <dd>层叠样式表</dd>
        <dt>JavaScript</dt>
        <dd>脚本语言</dd>
      </dl>
    <!-- 要求五 -->
     <h2>学生信息表</h2>
     <table border="1">
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
            <th>城市</th>
        </tr>

        <tr>
            <td>张三</td>
            <td rowspan="3">20</td>
            <td rowspan="3">男</td>
            <td rowspan="3">深圳</td>
        </tr>

        <tr>
            <td>李四</td>
        </tr>

        <tr>
            <td>王五</td>
        </tr>
     </table>
    <!-- 要求六 -->
      <h2>注册表单</h2>
      <form>
      <input type="text" placeholder="请输入用户名">
      <br>
      <input type="password" placeholder="请输入密码">
      <br>
      <input type="password" placeholder="请再次输入密码">
      <button type="button">注册</button>
      <button type="reset">重置</button>
    <!-- 单选与多选框 -->
      <p><label><input type="radio" name="gender" checked>男</label></p>
      <p><label><input type="radio" name="gender">女</label></p>
      <h2>兴趣爱好</h2>
      <p><label><input type="checkbox" name="hobby" checked>篮球</label></p>
      <p><label><input type="checkbox" name="hobby">足球</label></p>
      <p><label><input type="checkbox" name="hobby">游戏</label></p>
    <!-- 下拉表单 -->
       <h2>城市</h2>
       <select>
        <option selected>南宁</option>
        <option>柳州</option>
        <option>桂林</option>
       </select>
    <!-- 文件上传 -->
        <h2>上传文件</h2>
        <p><input type="file"></p>
        <p><input type="file" multiple></p>
    <!-- 个人简介 -->
        <h2>个人简介</h2>
        <p><textarea placeholder="请输入个人简介"></textarea></p>
      </form>

</body>
</html>
